name: Homebrew

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Get tag from release workflow
        id: tag
        run: echo "version=${GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH:-$(git describe --tags --abbrev=0)}" >> "$GITHUB_OUTPUT"

      - name: Get release tag
        id: release
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release assets and compute checksums
        id: checksums
        run: |
          mkdir -p /tmp/assets
          gh release download "${{ steps.release.outputs.tag }}" --dir /tmp/assets
          
          DARWIN_AMD64_SHA=$(sha256sum /tmp/assets/apidiff-darwin-amd64 | awk '{print $1}')
          DARWIN_ARM64_SHA=$(sha256sum /tmp/assets/apidiff-darwin-arm64 | awk '{print $1}')
          LINUX_AMD64_SHA=$(sha256sum /tmp/assets/apidiff-linux-amd64 | awk '{print $1}')
          LINUX_ARM64_SHA=$(sha256sum /tmp/assets/apidiff-linux-arm64 | awk '{print $1}')

          echo "darwin_amd64_sha=$DARWIN_AMD64_SHA" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64_sha=$DARWIN_ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_amd64_sha=$LINUX_AMD64_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_arm64_sha=$LINUX_ARM64_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="${{ steps.release.outputs.tag }}"
          cat > apidiff.rb << EOF
          class Apidiff < Formula
            desc "Compare OpenAPI specifications and detect breaking changes"
            homepage "https://github.com/martyn/apidiff"
            version "$VERSION"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/martyn/apidiff/releases/download/$TAG/apidiff-darwin-arm64"
                sha256 "${{ steps.checksums.outputs.darwin_arm64_sha }}"
              else
                url "https://github.com/martyn/apidiff/releases/download/$TAG/apidiff-darwin-amd64"
                sha256 "${{ steps.checksums.outputs.darwin_amd64_sha }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/martyn/apidiff/releases/download/$TAG/apidiff-linux-arm64"
                sha256 "${{ steps.checksums.outputs.linux_arm64_sha }}"
              else
                url "https://github.com/martyn/apidiff/releases/download/$TAG/apidiff-linux-amd64"
                sha256 "${{ steps.checksums.outputs.linux_amd64_sha }}"
              end
            end

            def install
              binary = Dir["apidiff-*"].first || "apidiff"
              bin.install binary => "apidiff"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/apidiff --version")
            end
          end
          EOF

      - name: Push to Homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/martyncoup/homebrew-tap.git /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp apidiff.rb /tmp/tap/Formula/apidiff.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apidiff.rb
          git commit -m "apidiff ${{ steps.release.outputs.tag }}"
          git push
